name: Build Docker images

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          tags: ghcr.io/${{ github.repository_owner }}/multi-agent-interview-coach-backend:latest
          load: true
          push: false

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          tags: ghcr.io/${{ github.repository_owner }}/multi-agent-interview-coach-frontend:latest
          load: true
          push: false

      - name: Validate docker-compose config
        run: docker compose -f docker-compose.yml config

      - name: Start compose services for validation
        run: |
          docker compose -f docker-compose.yml up -d
          for i in {1..15}; do
            if curl -sSf http://localhost:8000/health; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs backend || true
          exit 1

      - name: Stop compose validation services
        if: always()
        run: docker compose -f docker-compose.yml down

      - name: Save images to tarballs
        run: |
          docker save ghcr.io/${{ github.repository_owner }}/multi-agent-interview-coach-backend:latest -o multi-agent-interview-coach-backend.tar
          docker save ghcr.io/${{ github.repository_owner }}/multi-agent-interview-coach-frontend:latest -o multi-agent-interview-coach-frontend.tar

      - name: Upload built images as artifact (exported tar)
        uses: actions/upload-artifact@v4
        with:
          name: built-images
          path: |
            ./multi-agent-interview-coach-backend.tar
            ./multi-agent-interview-coach-frontend.tar
