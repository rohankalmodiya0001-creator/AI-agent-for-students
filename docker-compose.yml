version: "3.9"
services:
  backend:
    build: .
    command: uvicorn backend.api.app:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app/src
    env_file:
      - .env
    volumes:
      - .:/app
      - ./src/data:/app/src/data

  frontend:
    build: .
    command: streamlit run src/frontend/app.py --server.port 8501 --server.enableCORS false
    ports:
      - "8501:8501"
    environment:
      - PYTHONPATH=/app/src
      - STREAMLIT_SERVER_PORT=8501
    env_file:
      - .env
    volumes:
      - .:/app
      - ./src/data:/app/src/data
    depends_on:
      - backend
